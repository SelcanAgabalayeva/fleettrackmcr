spring.application.name=api-gateway
server.port=8080

# =========================
# EUREKA
# =========================
eureka.client.service-url.defaultZone=http://discovery-server:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# =========================
# JWT
# =========================
jwt.secret=7f3c9b2a6d91e4c8a0f5d3b7e2c1a9f8d6b4c3e1a0f9d8c7b6a5e4d3c2b1a0

# =========================
# SWAGGER CONFIG
# =========================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

springdoc.swagger-ui.urls[0].name=Auth Service
springdoc.swagger-ui.urls[0].url=/auth/v3/api-docs

springdoc.swagger-ui.urls[1].name=Vehicle Service
springdoc.swagger-ui.urls[1].url=/vehicles/v3/api-docs

springdoc.swagger-ui.urls[2].name=Driver Service
springdoc.swagger-ui.urls[2].url=/drivers/v3/api-docs

springdoc.swagger-ui.urls[3].name=Tracking Service
springdoc.swagger-ui.urls[3].url=/tracking/v3/api-docs

springdoc.swagger-ui.urls[4].name=Notification Service
springdoc.swagger-ui.urls[4].url=/notify/v3/api-docs

# =====================================================
# DOCS ROUTES (MUST COME FIRST)
# =====================================================

# AUTH DOCS
spring.cloud.gateway.routes[0].id=auth-docs
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/v3/api-docs/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1

# VEHICLE DOCS
spring.cloud.gateway.routes[1].id=vehicle-docs
spring.cloud.gateway.routes[1].uri=lb://vehicle-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/vehicles/v3/api-docs/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=1

# DRIVER DOCS
spring.cloud.gateway.routes[2].id=driver-docs
spring.cloud.gateway.routes[2].uri=lb://driver-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/drivers/v3/api-docs/**
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=1

# TRACKING DOCS
spring.cloud.gateway.routes[3].id=tracking-docs
spring.cloud.gateway.routes[3].uri=lb://tracking-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/tracking/v3/api-docs/**
spring.cloud.gateway.routes[3].filters[0]=StripPrefix=1

# NOTIFICATION DOCS
spring.cloud.gateway.routes[4].id=notify-docs
spring.cloud.gateway.routes[4].uri=lb://notification-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/notify/v3/api-docs/**
spring.cloud.gateway.routes[4].filters[0]=StripPrefix=1

# =====================================================
# NORMAL SERVICE ROUTES
# =====================================================

# AUTH SERVICE
spring.cloud.gateway.routes[5].id=auth-service
spring.cloud.gateway.routes[5].uri=lb://auth-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/auth/**

# VEHICLE SERVICE
spring.cloud.gateway.routes[6].id=vehicle-service
spring.cloud.gateway.routes[6].uri=lb://vehicle-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/vehicles/**

# DRIVER SERVICE
spring.cloud.gateway.routes[7].id=driver-service
spring.cloud.gateway.routes[7].uri=lb://driver-service
spring.cloud.gateway.routes[7].predicates[0]=Path=/drivers/**

# TRACKING SERVICE
spring.cloud.gateway.routes[8].id=tracking-service
spring.cloud.gateway.routes[8].uri=lb://tracking-service
spring.cloud.gateway.routes[8].predicates[0]=Path=/tracking/**

# NOTIFICATION SERVICE
spring.cloud.gateway.routes[9].id=notification-service
spring.cloud.gateway.routes[9].uri=lb://notification-service
spring.cloud.gateway.routes[9].predicates[0]=Path=/notify/**